name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpp-lint:
    name: C++ (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check C++ formatting
        run: |
          find . -name '*.cpp' -o -name '*.hpp' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

  cpp-check:
    name: C++ (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --suppress=missingInclude --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            wmx_ros2_package/src/ wmx_ros2_package/include/

  python-lint:
    name: Python (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 --max-line-length 120 --extend-ignore=E501 .

  xml-lint:
    name: XML (package.xml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Check XML well-formedness
        run: find . -name 'package.xml' | xargs xmllint --noout
